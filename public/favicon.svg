<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#1e1635"/>

  <!-- Orange head block -->
  <rect x="3" y="3" width="26" height="20" fill="#f5a623"/>

  <!-- Lower chin (darker orange) -->
  <rect x="5" y="17" width="22" height="6" fill="#c8780f"/>

  <!-- Left eye white -->
  <rect x="5" y="7" width="8" height="8" fill="#ffffff"/>
  <!-- Left pupil -->
  <rect x="7" y="9" width="4" height="4" fill="#111111"/>

  <!-- Right eye white -->
  <rect x="17" y="7" width="8" height="8" fill="#ffffff"/>
  <!-- Right pupil -->
  <rect x="19" y="9" width="4" height="4" fill="#111111"/>

  <!-- Teal feet peeking at bottom -->
  <rect x="8" y="26" width="6" height="3" fill="#4ecca3"/>
  <rect x="18" y="26" width="6" height="3" fill="#4ecca3"/>
</svg>
